server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # env.js is generated at container start; never cache it.
  location = /env.js {
    add_header Cache-Control "no-store";
    try_files /env.js =404;
  }

  # SPA fallback — all app routes resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
