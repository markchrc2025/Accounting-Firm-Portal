server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Correct MIME types for ES-module workers and WebAssembly. nginx's bundled
  # mime.types does NOT map `.mjs`, so it serves those files as
  # application/octet-stream — and the browser's strict module-MIME checking
  # then refuses to load them. That breaks pdf.js's module worker (used by the
  # COR reader), which is why COR OCR failed with "Couldn't read this COR".
  # An empty `types {}` clears the inherited map for just this location so the
  # `default_type` applies to the matched extension only (no global clobber).
  location ~* \.mjs$ {
    types { }
    default_type text/javascript;
  }
  location ~* \.wasm$ {
    types { }
    default_type application/wasm;
  }

  # env.js is generated at container start; never cache it.
  location = /env.js {
    add_header Cache-Control "no-store";
    try_files /env.js =404;
  }

  # SPA fallback — all app routes resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
