# Local development dependencies for the Accounting Firm Portal.
# `docker compose up -d` brings up PostgreSQL + Redis on the ports the
# .env.example DATABASE_URL / REDIS_URL point at.
services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - portal-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portal-postgres-data:
  portal-redis-data:
